<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      color: #1e293b;
    }

    .back-link {
      position: absolute;
      top: 1.2rem;
      left: 1.5rem;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #1d4ed8;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6em;
      color: #475569;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #ffffff;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #dbeafe;
      border-color: #1d4ed8;
      transform: scale(1.05);
    }

    .cell.x { color: #dc2626; }
    .cell.o { color: #1d4ed8; }

    .cell.win {
      background: #dbeafe;
      border-color: #1d4ed8;
      box-shadow: 0 0 16px rgba(29, 78, 216, 0.25);
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #1d4ed8;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
    }

    #reset:hover { background: #1e40af; transform: scale(1.04); }

    #scores {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }

    .score-box .label {
      color: #64748b;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    #score-x .value { color: #dc2626; }
    #score-draw .value { color: #64748b; }
    #score-o .value { color: #1d4ed8; }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">&#8592; Games</a>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box" id="score-x">
      <div class="label">X Wins</div>
      <div class="value" id="x-count">0</div>
    </div>
    <div class="score-box" id="score-draw">
      <div class="label">Draws</div>
      <div class="value" id="draw-count">0</div>
    </div>
    <div class="score-box" id="score-o">
      <div class="label">O Wins</div>
      <div class="value" id="o-count">0</div>
    </div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const xCount = document.getElementById('x-count');
    const oCount = document.getElementById('o-count');
    const drawCount = document.getElementById('draw-count');

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = parseInt(cell.dataset.index);
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const winLine = checkWin();
        if (winLine) {
          winLine.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `Player ${current} wins!`;
          scores[current]++;
          updateScores();
          gameOver = true;
        } else if (board.every(Boolean)) {
          status.textContent = "It's a draw!";
          scores.draw++;
          updateScores();
          gameOver = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Player ${current}'s turn`;
        }
      });
    });

    document.getElementById('reset').addEventListener('click', resetGame);

    function checkWin() {
      for (const line of WINS) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    function updateScores() {
      xCount.textContent = scores.X;
      oCount.textContent = scores.O;
      drawCount.textContent = scores.draw;
    }

    function resetGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      cells.forEach(cell => { cell.textContent = ''; cell.className = 'cell'; });
    }
  </script>
</body>
</html>
