<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Wordle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      color: #1e293b;
      padding-bottom: 2rem;
    }

    .back-link {
      position: absolute;
      top: 1.2rem;
      left: 1.5rem;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; }

    header {
      width: 100%;
      text-align: center;
      padding: 1.4rem 0 0.6rem;
      border-bottom: 1px solid #cbd5e1;
      margin-bottom: 1.4rem;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #1d4ed8;
    }

    #date-display {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 0.3rem;
      letter-spacing: 0.05em;
    }

    #message {
      font-size: 1.1rem;
      min-height: 1.6em;
      color: #1d4ed8;
      margin-bottom: 1rem;
      text-align: center;
      padding: 0 1rem;
      font-weight: 600;
    }

    /* Grid */
    #grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.4rem;
    }

    .row {
      display: flex;
      gap: 6px;
      perspective: 300px;
    }

    .tile {
      width: 58px;
      height: 58px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      font-weight: bold;
      text-transform: uppercase;
      background: #ffffff;
      color: #1e293b;
      transform: rotateX(0deg);
      transition: transform 0.2s ease;
    }

    .tile.filled { border-color: #94a3b8; }

    .tile.correct  { background: #16a34a; border-color: #16a34a; color: #fff; }
    .tile.present  { background: #ca8a04; border-color: #ca8a04; color: #fff; }
    .tile.absent   { background: #94a3b8; border-color: #94a3b8; color: #fff; }

    /* Flip-down: tile rotates away */
    .tile.flip-hide { transform: rotateX(90deg); }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .tile.pop   { animation: pop 0.12s ease; }
    .tile.shake { animation: shake 0.4s ease; }

    /* Keyboard */
    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .kb-row { display: flex; gap: 5px; }

    .key {
      height: 56px;
      min-width: 40px;
      padding: 0 6px;
      border: none;
      border-radius: 6px;
      background: #e2e8f0;
      color: #1e293b;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      user-select: none;
    }

    .key.wide { min-width: 62px; font-size: 0.75rem; }
    .key:hover { background: #cbd5e1; }

    .key.correct { background: #16a34a; color: #fff; }
    .key.present { background: #ca8a04; color: #fff; }
    .key.absent  { background: #94a3b8; color: #fff; }

    #tomorrow {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #64748b;
      text-align: center;
    }

    #play-again {
      display: none;
      margin-top: 1rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #1d4ed8;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
      font-weight: bold;
    }
    #play-again:hover { background: #1e40af; transform: scale(1.04); }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">&#8592; Games</a>

  <div id="tomorrow"></div>

    const ANSWER_WORDS = [...new Set(WORDS.filter(w => w.length === 5))];

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function getDailyWord() {
      const epoch = new Date('2024-01-01T00:00:00');
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const days = Math.floor((today - epoch) / 86400000);
      return ANSWER_WORDS[((days % ANSWER_WORDS.length) + ANSWER_WORDS.length) % ANSWER_WORDS.length].toUpperCase();
    }

    const MAX_GUESSES = 5;
    const WORD_LEN    = 5;
    const FLIP_DOWN   = 200;  // ms to rotate tile down
    const FLIP_UP     = 200;  // ms to rotate tile back up
    const TILE_GAP    = 300;  // ms between each tile's reveal

    let   TARGET      = getDailyWord();
    const STORAGE_KEY = 'wordle-' + todayStr();

    let guesses     = [];
    let currentInput = '';
    let gameOver    = false;
    let revealing   = false;  // block input during reveal animation

    // Restore
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved) {
      guesses  = saved.guesses || [];
      gameOver = saved.gameOver || false;
    }

    // Build grid
    const gridEl       = document.getElementById('grid');
    const msgEl        = document.getElementById('message');
    const tomorrowEl   = document.getElementById('tomorrow');
    const playAgainBtn = document.getElementById('play-again');

    document.getElementById('date-display').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    const tileEls = [];
    for (let r = 0; r < MAX_GUESSES; r++) {
      const rowEl = document.createElement('div');
      rowEl.className = 'row';
      const rowTiles = [];
      for (let c = 0; c < WORD_LEN; c++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        rowEl.appendChild(tile);
        rowTiles.push(tile);
      }
      gridEl.appendChild(rowEl);
      tileEls.push(rowTiles);
    }

    // Build keyboard
    const KB_ROWS = [
      ['q','w','e','r','t','y','u','i','o','p'],
      ['a','s','d','f','g','h','j','k','l'],
      ['Enter','z','x','c','v','b','n','m','⌫']
    ];

    KB_ROWS.forEach((keys, ri) => {
      const rowEl = document.getElementById(`kb-row-${ri}`);
      keys.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k.length > 1 ? ' wide' : '');
        btn.textContent = k === '⌫' ? '⌫' : k.toUpperCase();
        btn.dataset.key = k;
        btn.addEventListener('click', () => handleKey(k));
        rowEl.appendChild(btn);
      });
    });

    // Restore previous guesses instantly (no animation)
    guesses.forEach((guess, row) => showGuessInstant(guess, row));
    if (gameOver) showEndState();

    // Input
    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (e.key === 'Enter')     handleKey('Enter');
      else if (e.key === 'Backspace') handleKey('⌫');
      else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toLowerCase());
    });

    function handleKey(key) {
      if (gameOver || revealing) return;
      const row = guesses.length;
      if (row >= MAX_GUESSES) return;

      if (key === '⌫') {
        if (currentInput.length > 0) {
          currentInput = currentInput.slice(0, -1);
          const tile = tileEls[row][currentInput.length];
          tile.textContent = '';
          tile.classList.remove('filled');
        }
      } else if (key === 'Enter') {
        if (currentInput.length < WORD_LEN) {
          shakeRow(row);
          flashMsg('Not enough letters');
          return;
        }
        submitGuess();
      } else if (/^[a-z]$/.test(key) && currentInput.length < WORD_LEN) {
        const pos = currentInput.length;
        const tile = tileEls[row][pos];
        tile.textContent = key.toUpperCase();
        tile.classList.add('filled');
        // pop animation: remove and re-add to restart it
        tile.classList.remove('pop');
        void tile.offsetWidth; // force reflow
        tile.classList.add('pop');
        currentInput += key;
      }
    }

    function submitGuess() {
      const row   = guesses.length;
      const guess = currentInput.toUpperCase();
      currentInput = '';
      guesses.push(guess);
      revealing = true;

      const result = scoreGuess(guess, TARGET);
      const won    = guess === TARGET;
      const lost   = !won && guesses.length >= MAX_GUESSES;

      // Block input immediately so no letters slip in while tiles are revealing
      if (won || lost) gameOver = true;

      revealRow(row, guess, result, () => {
        revealing = false;
        if (won || lost) showEndState();
        save();
      });

      save();
    }

    // Animate reveal of one row, call onDone after last tile finishes
    function revealRow(row, guess, result, onDone) {
      result.forEach((state, col) => {
        const tile = tileEls[row][col];

        setTimeout(() => {
          // Phase 1: rotate tile away
          tile.classList.add('flip-hide');

          // Wait for rotation-down to complete, then swap content and rotate back
          tile.addEventListener('transitionend', function onFlipDown(e) {
            if (e.propertyName !== 'transform') return;
            tile.removeEventListener('transitionend', onFlipDown);

            tile.textContent = guess[col];
            tile.classList.remove('filled', 'flip-hide');
            tile.classList.add(state);
            updateKey(guess[col], state);
            // tile now transitions back to rotateX(0deg) automatically
          });

        }, col * TILE_GAP);
      });

      // Call onDone after the last tile has fully flipped back up
      const totalMs = (WORD_LEN - 1) * TILE_GAP + FLIP_DOWN + FLIP_UP + 50;
      setTimeout(onDone, totalMs);
    }

    // Show a guess row instantly (used when restoring from localStorage)
    function showGuessInstant(guess, row) {
      const result = scoreGuess(guess, TARGET);
      result.forEach((state, col) => {
        const tile = tileEls[row][col];
        tile.textContent = guess[col];
        tile.classList.add(state, 'filled');
        updateKey(guess[col], state);
      });
    }

    function scoreGuess(guess, target) {
      const result    = Array(WORD_LEN).fill('absent');
      const targetArr = target.split('');
      const guessArr  = guess.split('');
      const used      = Array(WORD_LEN).fill(false);

      // Pass 1: correct positions
      guessArr.forEach((ch, i) => {
        if (ch === targetArr[i]) {
          result[i]    = 'correct';
          used[i]      = true;
          guessArr[i]  = null;
        }
      });

      // Pass 2: present (wrong position)
      guessArr.forEach((ch, i) => {
        if (!ch) return;
        const j = targetArr.findIndex((t, ti) => t === ch && !used[ti]);
        if (j !== -1) {
          result[i] = 'present';
          used[j]   = true;
        }
      });

      return result;
    }

    function updateKey(letter, state) {
      const priority = { correct: 3, present: 2, absent: 1 };
      const keyEl = document.querySelector(`.key[data-key="${letter.toLowerCase()}"]`);
      if (!keyEl) return;
      const cur = keyEl.dataset.state || '';
      if (!cur || priority[state] > (priority[cur] || 0)) {
        keyEl.classList.remove(cur);
        keyEl.classList.add(state);
        keyEl.dataset.state = state;
      }
    }

    function shakeRow(row) {
      tileEls[row].forEach(t => {
        t.classList.remove('shake');
        void t.offsetWidth;
        t.classList.add('shake');
        setTimeout(() => t.classList.remove('shake'), 400);
      });
    }

    function flashMsg(text) {
      msgEl.textContent = text;
      setTimeout(() => { if (msgEl.textContent === text) msgEl.textContent = ''; }, 1500);
    }

    function showEndState() {
      const won = guesses[guesses.length - 1] === TARGET;
      if (won) {
        const labels = ['Genius!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!'];
        msgEl.textContent = labels[Math.min(guesses.length - 1, labels.length - 1)];
      } else {
        msgEl.textContent = `The word was ${TARGET}`;
      }
      playAgainBtn.style.display = 'inline-block';
    }

    function resetGame() {
      // Pick a new random word
      let newWord;
      do {
        newWord = ANSWER_WORDS[Math.floor(Math.random() * ANSWER_WORDS.length)].toUpperCase();
      } while (newWord === TARGET);
      TARGET = newWord;

      guesses      = [];
      currentInput = '';
      gameOver     = false;
      revealing    = false;

      // Clear all tiles
      tileEls.forEach(row => row.forEach(tile => {
        tile.textContent = '';
        tile.className = 'tile';
      }));

      // Reset keyboard
      document.querySelectorAll('.key').forEach(key => {
        key.classList.remove('correct', 'present', 'absent');
        delete key.dataset.state;
      });

      msgEl.textContent        = '';
      tomorrowEl.textContent   = '';
      playAgainBtn.style.display = 'none';

      localStorage.removeItem(STORAGE_KEY);
    }

    playAgainBtn.addEventListener('click', resetGame);

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ guesses, gameOver }));
    }
  </script>
</body>
</html>
