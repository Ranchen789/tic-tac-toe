<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      padding: 2rem;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 0.12em;
      color: #e94560;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      margin-bottom: 3rem;
    }

    .games {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 2.4rem 2.8rem;
      width: 240px;
      text-align: center;
      text-decoration: none;
      color: #eee;
      border: 2px solid #2a2a4a;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #e94560;
      box-shadow: 0 12px 32px rgba(233, 69, 96, 0.2);
    }

    .card-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      color: #e94560;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      margin-top: 0.8rem;
      font-size: 0.72rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      background: #2a2a4a;
      color: #a8dadc;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <h1>GAMES</h1>
  <p class="subtitle">Pick a game to play</p>

  <div class="games">
    <a class="card" href="tictactoe.html">
      <div class="card-icon">&#10799;</div>
      <div class="card-title">TIC TAC TOE</div>
      <div class="card-desc">Two players take turns. Get three in a row to win.</div>
      <span class="badge">2 Players</span>
    </a>

    <a class="card" href="wordle.html">
      <div class="card-icon">&#128286;</div>
      <div class="card-title">WORDLE</div>
      <div class="card-desc">Guess the 5-letter word in 5 tries. New word every day.</div>
      <span class="badge">Daily</span>
    </a>
  </div>
</body>
</html>
